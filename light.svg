        <circle cx="30" cy="10" r="6" fill="#F59E0B" opacity="0.8" />
        <circle cx="50" cy="10" r="6" fill="#10B981" opacity="0.8" />
        <text x="75" y="14" font-family="sans-serif" font-size="12" fill="#475569" font-weight="500" letter-spacing="1">guest@abhinand: ~</text>
      </g>

      <line x1="0" y1="30" x2="660" y2="30" stroke="rgba(15,23,42,0.05)" stroke-width="1" />

      <g transform="translate(0, 70)" font-family="sans-serif">
        
        <text x="0" y="0" font-size="36" font-weight="800" fill="#0F172A" letter-spacing="-0.5">
          Hi 👋 I'm <tspan fill="url(#accent-gradient)">Abhinand SD</tspan>
        </text>

        <g transform="translate(0, 45)" font-family="monospace" font-size="20" font-weight="600">
          <text x="0" y="0" fill="#475569">&gt; </text>
          
          <g transform="translate(20, 0)">
            <text x="0" y="0" fill="#2563EB" clip-path="url(#type-clip-1)">Software Engineer</text>
            <text x="0" y="0" fill="#8B5CF6" clip-path="url(#type-clip-2)">Full Stack Developer</text>
            <text x="0" y="0" fill="#10B981" clip-path="url(#type-clip-3)">Open Source Contributor</text>
