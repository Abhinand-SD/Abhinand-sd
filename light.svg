              <rect x="0" y="0" width="70" height="30" rx="15" fill="rgba(15,23,42,0.04)" stroke="rgba(15,23,42,0.08)"/>
              <text x="35" y="19" fill="#1E293B" text-anchor="middle">React</text>

              <rect x="80" y="0" width="80" height="30" rx="15" fill="rgba(15,23,42,0.04)" stroke="rgba(15,23,42,0.08)"/>
              <text x="120" y="19" fill="#1E293B" text-anchor="middle">Next.js</text>

              <rect x="170" y="0" width="80" height="30" rx="15" fill="rgba(15,23,42,0.04)" stroke="rgba(15,23,42,0.08)"/>
              <text x="210" y="19" fill="#1E293B" text-anchor="middle">Node.js</text>

              <rect x="260" y="0" width="105" height="30" rx="15" fill="rgba(15,23,42,0.04)" stroke="rgba(15,23,42,0.08)"/>
              <text x="312.5" y="19" fill="#1E293B" text-anchor="middle">TypeScript</text>
              
              <rect x="375" y="0" width="85" height="30" rx="15" fill="rgba(15,23,42,0.04)" stroke="rgba(15,23,42,0.08)"/>
              <text x="417.5" y="19" fill="#1E293B" text-anchor="middle">Tailwind</text>
            </g>

            <g transform="translate(0, 40)">
              <rect x="0" y="0" width="75" height="30" rx="15" fill="rgba(15,23,42,0.04)" stroke="rgba(15,23,42,0.08)"/>
              <text x="37.5" y="19" fill="#1E293B" text-anchor="middle">Python</text>

              <rect x="85" y="0" width="75" height="30" rx="15" fill="rgba(15,23,42,0.04)" stroke="rgba(15,23,42,0.08)"/>
